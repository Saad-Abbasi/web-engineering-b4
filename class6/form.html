<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML FORMS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="d1">
        <h2>Contact us form </h2>
        <h4>Dont hesitate to contact us, We are available 24/7</h4>
        <form id="form1">
            <input type="text" id="fname" placeholder="First Name" required> <br>
            <input type="text" placeholder="Last Name"> <br>
            <input type="email" placeholder="Enter Your Email" required> <br>
            <input type="phone" placeholder="Enter Phone"> <br>
            Gender : <br>
            MALE <input type="radio" value="male" name="gender">
            Female <input type="radio" value="female" name="gender">
            <br>
            <input type="checkbox" name="hobby" value="Cricket"> Cricket  
            <input type="checkbox" name="hobby" value="Badminton"> Badmintton  
            <input type="checkbox" name="hobby" value="Basket Ball"> Basket Ball 
            <br> 
            <input type="password" placeholder="Enter your Password">
            <input type="date">
            <br>
            Choose Country
            <Select>
                <option value="Pk">PAKISTAN</option>
                <option value="AFG">AFGHANISTAN</option>
                <option value="TM">TURKIMANISTAN</option>
                <option value="ML">MALAYSIA</option>
                <option value="CH">CHINA</option>
                <option value="RS">RUSIA</option>
            </Select>
            <br>
            <textarea name="Address" rows="5"></textarea>
            <input type="submit" value="Submit">
        </form>
    </div>

</body>

</html>
